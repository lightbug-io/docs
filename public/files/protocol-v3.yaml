  57:
    name: Accelerometer Data
    id: _accelData
    alpha: API is still evolving and may gain additional fields in future firmware versions.
    description: |
      Accelerometer metrics captured over time + events. Most values are time based (averages, highest value since X) or threshold based (highest value since the last one) - you can use the SET method to reset thresholds & baselines.
      Values are generated on-device from FIFO samples and include tilt and g-vector summaries.
      Everything is in 0.1g or degrees for clarity: whilst higher precision data is available, the accuracy can only really be trusted up to 0.1g or 1deg increments, and this keeps the payload size down.

      **Partial messages:** When only one or more of the per-axis maximum G component fields (keys 9/10/11) change and all other fields are unchanged, the device emits two messages back-to-back. First, a sparse MT_ACCEL_DATA message containing only the changed component field(s) at Q_ChangesOnly level, allowing subscribers to react immediately to axis-level changes. Second, a full MT_ACCEL_DATA message (all fields) at Q_Valid level. In all other cases only one full message is emitted, at Q_ChangesOnly if any field changed or Q_Valid if the store is unchanged.
    group: ungrouped
    data:
      1:
        name: Version
        id: version
        description: Payload version / flags. Currently 0.
        type: uint8
      2:
        name: Latest Tilt
        id: latestTilt
        description: Latest tilt angles as signed int8 [x, y, z] in degrees.
        type: bytes
      3:
        name: Baseline Tilt
        id: baselineTilt
        description: Baseline tilt angles as signed int8 [x, y, z] in degrees.
        type: bytes
      4:
        name: Maximum Tilt
        id: maxTilt
        description: Tilt angles as signed int8 [x, y, z] at the maximum observed tilt delta from baseline.
        type: bytes
      5:
        name: Maximum Tilt Time
        id: maxTiltTs
        description: Unix timestamp for the maximum tilt event.
        type: uint32
        unit: s since epoch
      6:
        name: Average G Vector
        id: avgG
        description: Average vector as signed int8 [x, y, z, magnitude] in 0.1g units.
        type: bytes
      7:
        name: Maximum G Vector
        id: maxG
        description: Maximum magnitude vector as signed int8 [x, y, z, magnitude] in 0.1g units.
        type: bytes
      8:
        name: Maximum G Time
        id: maxGTs
        description: Unix timestamp for the maximum g event.
        type: uint32
        unit: s since epoch
      9:
        name: Maximum G Component X
        id: maxGComponentX
        description: Per-axis absolute maximum on X in 0.1g units.
        type: int8
      10:
        name: Maximum G Component Y
        id: maxGComponentY
        description: Per-axis absolute maximum on Y in 0.1g units.
        type: int8
      11:
        name: Maximum G Component Z
        id: maxGComponentZ
        description: Per-axis absolute maximum on Z in 0.1g units.
        type: int8
      12:
        name: Variance
        id: varianceMg
        description: Variance indicator derived from the running standard deviation magnitude, clamped to 0..255 mg.
        type: uint8
        unit: mg
    methods:
      GET: null
      SET: null
      SUBSCRIBE: null
      UNSUBSCRIBE: null
