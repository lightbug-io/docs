  47:
    name: CPU2 Sleep
    id: cpu2Sleep
    alpha: This message is specified, but not actively used by the Toit SDK at this time.
    description: |
      Request CPU2 sleep or WiFi override behaviour.
      For METHOD_SET, Header Duration (7) controls how long a forced WiFi override remains active.
      The same Duration timeout applies to both force-on and force-off modes.
    group: power
    header:
      - 5
      - 7
    data:
      2:
        name: Wake on Event
        id: wakeOnEvent
        description: Should CPU1 wake up CPU2 on new events / messages
        type: bool
      10:
        name: WiFi Override Mode
        id: wifiOnOff
        description: Forced WiFi override mode.
        type: uint8
        values:
          0:
            name: Force Off
            description: Force WiFi off for the Duration timeout (or indefinitely if Duration is omitted).
          1:
            name: Force On
            description: Force WiFi on for the Duration timeout (or indefinitely if Duration is omitted).
          2:
            name: Clear Override
            description: Clear any forced WiFi override and return to normal WiFi power behavior.
    methods:
      GET: null
      SET: null
    examples:
      - name: Force WiFi on to disable ESP hibernation
        description: |
          Send METHOD_SET with wifiOnOff=1 and wakeOnEvent=0.
          Set Header Duration (7) to define the forced-on time in ms.
          This forces WiFi on and prevents the ESP hibernate path while the override is active.
          If Duration is omitted, the forced-on state remains until changed by a later request.
        bytes: ""
      - name: Clear WiFi override (return to normal behavior)
        description: |
          Send METHOD_SET with wifiOnOff=2.
          This clears any forced WiFi override immediately, without forcing ON or OFF.
        bytes: ""
